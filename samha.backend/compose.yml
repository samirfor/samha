## Legacy compose kept for reference.
## Use the root-level /home/ubuntu/git/samha/docker-compose.yml for the full stack.
version: '3.5'

services:
  parcerias:
    image: mysql:8.0.28
    restart: always
    environment:
      MYSQL_DATABASE: samha
      MYSQL_ROOT_PASSWORD: 12345678
    ports:
      - "3306:3306"
    expose:
      - 3306
    volumes:
      - parcerias:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin_parcerias
    environment:
      PMA_HOST: parcerias
      PMA_USER: root
      PMA_PASSWORD: 12345678
    restart: always
    ports:
      - 9001:80
volumes:
  parcerias: